<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/static/manifest.json?v=7">
    <title>Aurelia</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aurelia">

    <style>
        /* --- GLOBAL AESTHETICS --- */
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #050505;
            --term-green: #00ff41;
            --term-dark: #002200;
            --text-main: #ffffff;
            --text-dim: #777777;
            --pixel-border: 1px solid #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION TABS --- */
        #NavBar {
            display: flex;
            background: #111;
            border-bottom: var(--pixel-border);
            height: 40px;
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-btn.active {
            color: var(--term-green);
            background: var(--term-dark);
            border-bottom: 2px solid var(--term-green);
        }

        /* --- VIEW CONTAINERS --- */
        .view-container {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-height: 0; 
            padding: 8px;
            gap: 8px;
        }
        .view-container.active {
            display: flex;
        }

        /* --- TOP GRID --- */
        #TopGrid {
            display: grid;
            grid-template-columns: 35% 65%;
            gap: 8px;
            height: 130px; 
            flex-shrink: 0; 
        }
        .panel-col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
        .panel-box { border: var(--pixel-border); background: var(--panel-bg); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .header-label { font-size: 9px; color: var(--text-main); text-align: center; margin-bottom: 2px; text-transform: uppercase; flex-shrink: 0; }
        .header-label.green { color: var(--term-green); }

        #AvatarBox { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0; overflow: hidden; }
        #AureliaAvatar { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        #ThermalsBox { padding: 6px; justify-content: center; gap: 5px; flex-shrink: 0; }
        .somatic-bar { display: flex; align-items: center; font-size: 8px; color: var(--text-main); }
        .bar-label { width: 30px; }
        .bar-fill-container { flex: 1; height: 6px; background: #222; margin-left: 5px; }
        .bar-fill { height: 100%; background: var(--term-green); width: 0%; transition: width 0.3s; }

        #TerminalBox { flex: 1; padding: 6px; font-size: 9px; color: var(--term-green); overflow-y: auto; line-height: 1.2; background: #000; }

        /* --- LIVE CAMERA VIEWPORT --- */
        #CameraContainer {
            display: none;
            width: 100%;
            border: var(--pixel-border);
            background: #000;
            position: relative;
            max-height: 40vh;
            flex-shrink: 0;
            overflow: hidden;
        }
        #LivePreview { width: 100%; height: 100%; object-fit: contain; }
        
        .cam-overlay { 
            position: absolute; 
            top: 5px; 
            left: 5px; 
            font-size: 11px; 
            color: var(--term-green); 
            background: rgba(0,0,0,0.8); 
            padding: 4px 8px; 
            border: 1px solid var(--term-green); 
            z-index: 10; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- CHAT AREA --- */
        #ChatContainer { flex: 1; border: var(--pixel-border); background: var(--panel-bg); display: flex; flex-direction: column; min-height: 0; padding: 8px; overflow-y: auto; gap: 6px; font-size: 11px; line-height: 1.3; }
        .msg-geiger { color: var(--term-green); } 
        .msg-aurelia { color: var(--text-main); } 
        .chat-image { max-width: 100%; border-radius: 8px; margin-top: 4px; border: var(--pixel-border); }

        /* --- INPUT AREA (STACKED LAYOUT) --- */
        #InputArea { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; padding: 6px 0; }
        .input-row { display: flex; gap: 6px; height: 45px; width: 100%; }
        .icon-row { display: flex; gap: 6px; height: 35px; width: 100%; overflow-x: auto; padding-bottom: 2px; }
        
        .eye-btn { background: #111; border: var(--pixel-border); color: var(--text-dim); padding: 0 15px; cursor: pointer; font-size: 13px; font-weight: bold; flex-shrink: 0; border-radius: 4px; }
        .vitals-btn { background: #111; border: var(--pixel-border); color: #d32f2f; padding: 0 15px; cursor: pointer; font-size: 13px; font-weight: bold; flex-shrink: 0; border-radius: 4px; }
        .vitals-btn.active { background: #d32f2f; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #InputWrapper { flex: 1; display: flex; border: var(--pixel-border); background: #000; align-items: center; padding-left: 10px; border-radius: 4px; }
        .prompt-arrow { color: var(--term-green); font-weight: bold; margin-right: 8px; font-size: 16px; }
        #ChatInput { flex: 1; background: transparent; border: none; color: var(--term-green); font-family: inherit; outline: none; font-size: 15px; }
        .send-btn { background: var(--term-green); color: #000; border: none; width: 50px; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 4px; }
        
        #LibraryList { padding: 10px; overflow-y: auto; flex: 1; }
        .library-item { padding: 10px; border: var(--pixel-border); margin-bottom: 8px; background: #111; cursor: pointer; }
        .library-item h3 { font-size: 12px; color: var(--text-main); } 
        .library-item p { font-size: 10px; color: #777; margin-top: 4px; }

        /* --- PREVIEW MODAL --- */
        #PreviewModal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(10, 10, 10, 0.95); 
            z-index: 1000; 
            flex-direction: column; 
            padding: 20px;
        }
        #PreviewImage {
            flex: 1; 
            object-fit: contain; 
            min-height: 0; 
            margin-bottom: 15px;
            border-radius: 8px;
            border: var(--pixel-border);
        }
        #PreviewCaption {
            height: 50px; 
            border-radius: 8px; 
            padding: 10px; 
            border: 1px solid var(--term-green); 
            background: #111;
            color: var(--term-green);
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .preview-btn-row {
            display: flex; 
            gap: 15px; 
            height: 50px;
            flex-shrink: 0;
        }
        .preview-btn {
            flex: 1; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-retake { background: #d32f2f; color: white; }
        .btn-send { background: var(--term-green); color: black; }
    </style>
</head>
<body>

    <audio id="VoicePlayer" autoplay playsinline></audio>

    <input type="file" id="FileUploadInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">

    <div id="NavBar">
        <button class="nav-btn active" onclick="switchView('PortalView')">AURELIA V1.0</button>
        <button class="nav-btn" onclick="switchView('LibraryView')">LIBRARY</button>
    </div>

    <div id="PortalView" class="view-container active">
        <div id="TopGrid">
            <div class="panel-col">
                <div class="header-label green">AURELIA V1.0</div>
                <div class="panel-box" id="AvatarBox">
                    <img id="AureliaAvatar" src="/static/aurelia_pixel.png" alt="Aurelia Pixel">
                </div>
            </div>
            <div class="panel-col">
                <div class="panel-box" id="ThermalsBox">
                    <div class="somatic-bar"><span class="bar-label">CPU</span><div class="bar-fill-container"><div class="bar-fill" id="bar-cpu"></div></div><span id="text-cpu" style="margin-left:4px; min-width:30px;">--°C</span></div>
                    <div class="somatic-bar"><span class="bar-label">iGPU</span><div class="bar-fill-container"><div class="bar-fill" id="bar-igpu"></div></div><span id="text-igpu" style="margin-left:4px; min-width:30px;">--°C</span></div>
                    <div class="somatic-bar"><span class="bar-label">eGPU</span><div class="bar-fill-container"><div class="bar-fill" id="bar-egpu"></div></div><span id="text-egpu" style="margin-left:4px; min-width:30px;">--°C</span></div>
                </div>
                <div class="panel-box" id="TerminalBox">
                    > Subconscious Terminal Active...<br>
                </div>
            </div>
        </div>

        <div id="CameraContainer">
            <div class="cam-overlay">
                <span id="CamLabel">EYE_FEED: CONNECTING...</span>
            </div>
            <video id="LivePreview" autoplay playsinline></video>
            <canvas id="SnapCanvas" style="display:none;"></canvas>
        </div>

        <div id="ChatContainer">
            <div class="msg-geiger">Geiger (User): [SYSTEM] Secure Tether Established.</div>
        </div>

        <div id="InputArea">
            <div class="input-row">
                <div id="InputWrapper">
                    <span class="prompt-arrow">></span>
                    <input type="text" id="ChatInput" autocomplete="off">
                </div>
                <button class="send-btn" onclick="sendChatMessage()">></button>
            </div>
            
            <div class="icon-row">
                <button class="vitals-btn" id="BleBtn" onclick="toggleWebBluetooth()">[♥]</button>
                <button class="eye-btn" id="CamBtn" onclick="handleEyeToggle()">[👁]</button>
                
                <button class="eye-btn" id="CamCloseBtn" style="display:none; color:#ff3333;" onclick="closeCamera()">[&lt;-]</button>
                
                <button class="eye-btn" id="SnapBtn" style="display:none; color:var(--term-green);" onclick="takeOpticSnap()">[SNAP]</button>
                
                <button class="eye-btn" id="FolderBtn" style="color:#2196F3;" onclick="triggerFileUpload()">[📁]</button>
                
                <button class="eye-btn" style="color: #FF8F00;" onclick="promptSetGoal()">[🦊]</button>
            </div>
        </div>
    </div>

    <div id="LibraryView" class="view-container">
        <div id="LibraryList"><div style="color:#777; text-align:center; margin-top:20px;">Fetching Archives...</div></div>
    </div>

    <div id="PreviewModal">
        <img id="PreviewImage" src="">
        <input type="text" id="PreviewCaption" placeholder="Add context or a caption (optional)...">
        <div class="preview-btn-row">
            <button class="preview-btn btn-retake" onclick="retakePhoto()">RETAKE</button>
            <button class="preview-btn btn-send" onclick="sendPhoto()">SEND TO AURELIA</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // SESSION STORAGE LOGIC (Survives Minimize)
        // ----------------------------------------------------
        function saveChatHistory() {
            const chatContainer = document.getElementById('ChatContainer');
            if (chatContainer) {
                sessionStorage.setItem('aurelia_mobile_history', chatContainer.innerHTML);
            }
        }

        function restoreChatHistory() {
            const chatContainer = document.getElementById('ChatContainer');
            const savedHistory = sessionStorage.getItem('aurelia_mobile_history');
            if (chatContainer && savedHistory) {
                chatContainer.innerHTML = savedHistory;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            restoreChatHistory();
        });

        // --- PWA CAMERA THAW PROTOCOL ---
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && isCamActive) {
                console.log("PWA Woke Up. Thawing camera stream...");
                if(videoDevices.length > 0) {
                    startCamera(videoDevices[currentCamIndex].deviceId).catch(e => {
                        appendChat('msg-aurelia', '[ERROR] Failed to wake optic sensor.');
                    });
                }
            }
        });

        // ----------------------------------------------------
        // VIEW SWITCHING
        // ----------------------------------------------------
        function switchView(viewId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
            if (viewId === 'LibraryView') fetchLibrary();
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = `${wsProtocol}//${window.location.host}`;
        let portalWS = null;
        let systemWS = null;

        let currentStream = null;
        let videoDevices = [];
        let currentCamIndex = 0;
        let isCamActive = false;
        
        let currentSnapBlob = null; // Holds the image temporarily before sending

        // ----------------------------------------------------
        // CAMERA LOGIC (CYCLE / OPEN)
        // ----------------------------------------------------
        async function handleEyeToggle() {
            const container = document.getElementById('CameraContainer');
            const snapBtn = document.getElementById('SnapBtn');
            const camBtn = document.getElementById('CamBtn');
            const closeBtn = document.getElementById('CamCloseBtn');

            if (!isCamActive) {
                try {
                    const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    initialStream.getTracks().forEach(t => t.stop());

                    const devices = await navigator.mediaDevices.enumerateDevices();
                    videoDevices = devices.filter(d => d.kind === 'videoinput');
                    
                    if (videoDevices.length === 0) {
                        appendChat('msg-aurelia', '[ERROR] No optic sensors found.');
                        return;
                    }

                    await startCamera(videoDevices[currentCamIndex].deviceId);
                    container.style.display = 'block';
                    snapBtn.style.display = 'block';
                    closeBtn.style.display = 'block';
                    camBtn.style.color = 'var(--term-green)';
                    isCamActive = true;
                    updateCamLabel();
                } catch (err) {
                    appendChat('msg-aurelia', `[ERROR] Optic Denied: ${err.name}`);
                }
            } else {
                if (videoDevices.length < 2) return;
                currentCamIndex = (currentCamIndex + 1) % videoDevices.length;
                try {
                    await startCamera(videoDevices[currentCamIndex].deviceId);
                    updateCamLabel();
                } catch (e) {
                    console.error("Cycle failed", e);
                    handleEyeToggle(); 
                }
            }
        }

        function closeCamera() {
            stopCamera();
            document.getElementById('CameraContainer').style.display = 'none';
            document.getElementById('SnapBtn').style.display = 'none';
            document.getElementById('CamCloseBtn').style.display = 'none';
            document.getElementById('CamBtn').style.color = 'var(--text-dim)';
            isCamActive = false;
        }

        async function startCamera(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const constraints = { video: { deviceId: { exact: deviceId } } };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('LivePreview').srcObject = currentStream;
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function updateCamLabel() {
            const label = document.getElementById('CamLabel');
            label.innerText = `EYE_FEED: LENS ${currentCamIndex + 1}/${videoDevices.length}`;
        }

        // ----------------------------------------------------
        // PHOTO CAPTURE & PREVIEW MODAL
        // ----------------------------------------------------
        async function takeOpticSnap() {
            const video = document.getElementById('LivePreview');
            const canvas = document.getElementById('SnapCanvas');
            const context = canvas.getContext('2d');
            
            if (video.videoWidth === 0) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Generate Data URL for instant preview
            const dataUrl = canvas.toDataURL('image/jpeg', 0.80);
            document.getElementById('PreviewImage').src = dataUrl;
            
            // Store blob in memory for sending later
            canvas.toBlob((blob) => {
                currentSnapBlob = blob;
            }, 'image/jpeg', 0.80);

            // Pop open the modal
            document.getElementById('PreviewModal').style.display = 'flex';
        }

        function retakePhoto() {
            document.getElementById('PreviewModal').style.display = 'none';
            document.getElementById('PreviewImage').src = '';
            document.getElementById('PreviewCaption').value = '';
            currentSnapBlob = null;
        }

        async function sendPhoto() {
            if (!currentSnapBlob) return;
            
            const captionInput = document.getElementById('PreviewCaption');
            const captionText = captionInput.value.trim();

            document.getElementById('PreviewModal').style.display = 'none';
            appendChat('msg-geiger', '[SYSTEM] Vision Transmission Initiated...');
            
            const formData = new FormData();
            formData.append('file', currentSnapBlob, 'mobile_snap.jpg');
            
            try {
                // Send Image
                const response = await fetch('/upload_image', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Server rejected frame.");
                
                // If there's a caption, send it over WebSocket right behind the image
                if (captionText && portalWS?.readyState === WebSocket.OPEN) {
                    portalWS.send(JSON.stringify({ type: "chat", text: `[Image Context]: ${captionText}` }));
                    appendChat('msg-geiger', `Geiger: [Image Context]: ${captionText}`);
                }
            } catch (err) {
                appendChat('msg-aurelia', '[ERROR] Transmission Failed.');
            }
            
            // Clean up the modal state
            captionInput.value = '';
            currentSnapBlob = null;
            document.getElementById('PreviewImage').src = '';
        }

        // ----------------------------------------------------
        // FILE UPLOAD (Intercepts Gallery uploads to the Preview Modal)
        // ----------------------------------------------------
        function triggerFileUpload() {
            document.getElementById('FileUploadInput').click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('PreviewImage').src = e.target.result;
                currentSnapBlob = file; 
                document.getElementById('PreviewModal').style.display = 'flex';
            };
            reader.readAsDataURL(file);
            
            // Reset input so the same file can be selected again
            event.target.value = '';
        }

        // ----------------------------------------------------
        // BLUETOOTH & ROBUST SOCKETS
        // ----------------------------------------------------
        let bleDevice = null;
        async function toggleWebBluetooth() {
            const btn = document.getElementById('BleBtn');
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
                btn.classList.remove('active');
                return;
            }
            try {
                bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value;
                    const bpm = val.getUint8(1);
                    if (portalWS?.readyState === WebSocket.OPEN) portalWS.send(JSON.stringify({ type: "mobile_bpm", bpm }));
                });
                btn.classList.add('active');
                appendChat('msg-aurelia', '[SYSTEM] Vitals Linked.');
            } catch (error) {
                appendChat('msg-aurelia', `[ERROR] BLE: ${error.message}`);
            }
        }

        // --- PWA SUSPENSION RECONNECT PATCH ---
        function connectPortalWS() {
            portalWS = new WebSocket(`${wsHost}/ws/portal`);
            portalWS.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "audio") {
                    const player = document.getElementById('VoicePlayer');
                    player.src = data.url + "?t=" + Date.now();
                    player.play();
                } else if (data.type === "chat") {
                    appendChat('msg-aurelia', `Aurelia: ${data.text}`);
                } else if (data.type === "image") {
                    appendImage(data.data);
                }
            };
            portalWS.onclose = () => {
                setTimeout(connectPortalWS, 3000);
            };
        }

        function connectSystemWS() {
            systemWS = new WebSocket(`${wsHost}/ws/system`);
            systemWS.onmessage = (e) => {
                const payload = JSON.parse(e.data);
                if (payload.type === "somatic_data") updateSomaticHUD(payload.data);
                else if (payload.type === "terminal_log") appendTerminal(payload.text);
            };
            systemWS.onclose = () => {
                setTimeout(connectSystemWS, 3000);
            };
        }

        function connectWebSockets() {
            connectPortalWS();
            connectSystemWS();
        }

        function appendChat(className, text) {
            const box = document.getElementById('ChatContainer');
            const msg = document.createElement('div');
            msg.className = className;
            msg.textContent = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
            saveChatHistory(); 
        }

        function appendImage(src) {
            const box = document.getElementById('ChatContainer');
            const img = document.createElement('img');
            img.src = src;
            img.className = 'chat-image';
            box.appendChild(img);
            img.onload = () => {
                box.scrollTop = box.scrollHeight;
                saveChatHistory();
            };
        }

        function updateSomaticHUD(data) {
            const clamp = (val, max) => Math.min(100, Math.max(0, (val / max) * 100));
            document.getElementById('bar-cpu').style.width = clamp(data.cpu_thermals || 0, 90) + '%';
            document.getElementById('bar-igpu').style.width = clamp(data.brain_thermals_strix || 0, 90) + '%';
            document.getElementById('bar-egpu').style.width = clamp(data.eye_thermals_v620 || 0, 90) + '%';
            document.getElementById('text-cpu').innerText = (data.cpu_thermals || 0).toFixed(1) + '°C';
            document.getElementById('text-igpu').innerText = (data.brain_thermals_strix || 0).toFixed(1) + '°C';
            document.getElementById('text-egpu').innerText = (data.eye_thermals_v620 || 0).toFixed(1) + '°C';
        }

        function appendTerminal(text) {
            const term = document.getElementById('TerminalBox');
            const cleanText = text.substring(0, 500); 
            term.innerHTML += `> ${cleanText}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('ChatInput');
            if (input.value.trim() && portalWS?.readyState === WebSocket.OPEN) {
                portalWS.send(JSON.stringify({ type: "chat", text: input.value.trim() }));
                appendChat('msg-geiger', `Geiger: ${input.value}`);
                input.value = '';
            }
        }

        function promptSetGoal() {
            const goal = prompt("Subconscious Lobe Directive:");
            if (goal && portalWS?.readyState === WebSocket.OPEN) {
                portalWS.send(JSON.stringify({ type: "set_goal", text: goal.trim() }));
                appendChat('msg-geiger', `[Goal Injected] ${goal}`);
            }
        }

        document.getElementById('ChatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        connectWebSockets();
    </script>
</body>
</html>
